# Release Benchmark Comparison
# Compares performance against the previous release before publishing
# Results are posted to the release notes
name: Release Benchmark

on:
  # Run when a release is created (before publish)
  release:
    types: [created]

  # Manual trigger for testing
  workflow_dispatch:
    inputs:
      current_version:
        description: 'Current version/tag to benchmark'
        required: true
        default: 'main'
      baseline_version:
        description: 'Previous version to compare against'
        required: true
        default: 'v0.9.0'

jobs:
  benchmark-comparison:
    runs-on: ubuntu-latest
    env:
      # Use environment variables to safely pass user inputs to shell commands
      INPUT_CURRENT: ${{ inputs.current_version }}
      INPUT_BASELINE: ${{ inputs.baseline_version }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0  # Need full history for tags

      - name: Validate inputs
        if: github.event_name == 'workflow_dispatch'
        run: |
          # Validate version inputs are valid git ref format
          if ! [[ "$INPUT_CURRENT" =~ ^[a-zA-Z0-9._/-]+$ ]]; then
            echo "Error: current_version must be a valid git ref"
            exit 1
          fi
          if ! [[ "$INPUT_BASELINE" =~ ^[a-zA-Z0-9._/-]+$ ]]; then
            echo "Error: baseline_version must be a valid git ref"
            exit 1
          fi

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.11

      - name: Determine versions
        id: versions
        run: |
          if [[ "${{ github.event_name }}" == "release" ]]; then
            CURRENT="${{ github.event.release.tag_name }}"
            # Get the previous tag (skip current tag, get next one)
            TAGS=$(git tag --sort=-version:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$')
            TAG_COUNT=$(echo "$TAGS" | wc -l)
            if [[ $TAG_COUNT -lt 2 ]]; then
              echo "Only one release tag exists, skipping comparison"
              BASELINE=""
            else
              BASELINE=$(echo "$TAGS" | head -2 | tail -1)
            fi
          else
            CURRENT="$INPUT_CURRENT"
            BASELINE="$INPUT_BASELINE"
          fi
          echo "current=$CURRENT" >> $GITHUB_OUTPUT
          echo "baseline=$BASELINE" >> $GITHUB_OUTPUT
          if [[ -n "$BASELINE" ]]; then
            echo "Comparing $CURRENT against $BASELINE"
          else
            echo "No baseline version for comparison"
          fi

      - name: Install system dependencies (GDAL for import operations)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends libgdal-dev gdal-bin

      - name: Install current version
        env:
          CURRENT_VERSION: ${{ steps.versions.outputs.current }}
        run: |
          git checkout "$CURRENT_VERSION"
          uv sync --all-extras

      - name: Pre-install DuckDB extensions
        run: |
          uv run python -c "import duckdb; con = duckdb.connect(); con.execute('INSTALL spatial'); con.execute('INSTALL httpfs')"

      - name: Download previous baselines for trend analysis
        id: download-baselines
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Create directory for historical baselines
          mkdir -p baselines

          # Get list of recent release tags (up to 5 previous releases)
          TAGS=$(git tag --sort=-version:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -6)
          echo "Found tags: $TAGS"

          BASELINE_COUNT=0
          for TAG in $TAGS; do
            # Skip current version
            if [[ "$TAG" == "${{ steps.versions.outputs.current }}" ]]; then
              continue
            fi

            echo "Attempting to download baseline for $TAG..."

            # Try to download artifact for this release
            # GitHub artifact names: release-benchmark-{version}
            ARTIFACT_NAME="release-benchmark-${TAG}"

            # List artifacts to see what's available (for debugging)
            gh api repos/${{ github.repository }}/actions/artifacts \
              --jq ".artifacts[] | select(.name == \"$ARTIFACT_NAME\") | .id" > /tmp/artifact_id.txt || true

            if [ -s /tmp/artifact_id.txt ]; then
              ARTIFACT_ID=$(cat /tmp/artifact_id.txt | head -1)
              echo "  Found artifact ID: $ARTIFACT_ID"

              # Download the artifact
              gh api repos/${{ github.repository }}/actions/artifacts/$ARTIFACT_ID/zip > /tmp/${TAG}.zip || {
                echo "  Failed to download artifact"
                continue
              }

              # Extract just the results JSON
              unzip -q -o /tmp/${TAG}.zip -d /tmp/${TAG}/ || {
                echo "  Failed to extract artifact"
                continue
              }

              # Find the results file
              RESULTS_FILE=$(find /tmp/${TAG}/ -name "results_*.json" | head -1)
              if [ -n "$RESULTS_FILE" ]; then
                cp "$RESULTS_FILE" baselines/results_${TAG}.json
                echo "  ✓ Downloaded baseline for $TAG"
                BASELINE_COUNT=$((BASELINE_COUNT + 1))
              else
                echo "  No results file found in artifact"
              fi
            else
              echo "  No artifact found for $TAG"
            fi

            # Limit to 5 baselines max
            if [ $BASELINE_COUNT -ge 5 ]; then
              break
            fi
          done

          echo "baseline_count=$BASELINE_COUNT" >> $GITHUB_OUTPUT
          echo "Downloaded $BASELINE_COUNT historical baselines"

      - name: Run current benchmarks
        env:
          CURRENT_VERSION: ${{ steps.versions.outputs.current }}
        run: |
          uv run python scripts/version_benchmark.py \
            --version-label "$CURRENT_VERSION" \
            -o results_current.json \
            -n 5 \
            --files full \
            --ops full

      - name: Install baseline version
        env:
          BASELINE_VERSION: ${{ steps.versions.outputs.baseline }}
        run: |
          git checkout "$BASELINE_VERSION"
          uv sync --all-extras

      - name: Run baseline benchmarks
        env:
          CURRENT_VERSION: ${{ steps.versions.outputs.current }}
          BASELINE_VERSION: ${{ steps.versions.outputs.baseline }}
        run: |
          # Copy the benchmark script from current (baseline may not have it)
          git show "$CURRENT_VERSION":scripts/version_benchmark.py > /tmp/version_benchmark.py

          uv run python /tmp/version_benchmark.py \
            --version-label "$BASELINE_VERSION" \
            -o results_baseline.json \
            -n 5 \
            --files full \
            --ops full

      - name: Generate comparison report
        id: comparison
        env:
          CURRENT_VERSION: ${{ steps.versions.outputs.current }}
          BASELINE_VERSION: ${{ steps.versions.outputs.baseline }}
        run: |
          git checkout "$CURRENT_VERSION"
          uv sync --all-extras

          # Generate comparison
          uv run python scripts/version_benchmark.py \
            --compare results_baseline.json results_current.json > comparison.txt

          # Check for regressions (>25% slower) - write to file for multiline handling
          uv run python -c "
          import json
          with open('results_baseline.json') as f:
              baseline = json.load(f)
          with open('results_current.json') as f:
              current = json.load(f)

          baseline_lookup = {(b['file_size'], b['operation']): b['avg_time'] for b in baseline['benchmarks'] if b['avg_time'] and b['avg_time'] > 0}
          regressions = []
          for b in current['benchmarks']:
              key = (b['file_size'], b['operation'])
              if b['avg_time'] and key in baseline_lookup:
                  delta = (b['avg_time'] - baseline_lookup[key]) / baseline_lookup[key]
                  if delta > 0.25:
                      regressions.append(f\"{b['operation']} ({b['file_size']}): +{delta*100:.0f}%\")
          with open('regressions.txt', 'w') as f:
              f.write('\n'.join(regressions) if regressions else 'none')
          "

          REGRESSIONS=$(cat regressions.txt)
          # Use heredoc for multiline output
          {
            echo "regressions<<EOF"
            cat regressions.txt
            echo "EOF"
          } >> $GITHUB_OUTPUT

          # Create summary
          echo "## Release Benchmark Comparison" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Current:** $CURRENT_VERSION" >> $GITHUB_STEP_SUMMARY
          echo "**Baseline:** $BASELINE_VERSION" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [[ "$REGRESSIONS" != "none" ]]; then
            echo "### ⚠️ Performance Regressions Detected" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "$REGRESSIONS" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
          else
            echo "### ✅ No Significant Regressions" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
          fi

          echo "### Detailed Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          cat comparison.txt >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY

      - name: Analyze trends across releases
        id: trends
        if: steps.download-baselines.outputs.baseline_count > 0
        env:
          CURRENT_VERSION: ${{ steps.versions.outputs.current }}
        run: |
          # Create ordered list of baseline files (oldest to newest)
          BASELINE_FILES=$(ls -t baselines/results_*.json | tac | tr '\n' ' ')
          echo "Baseline files: $BASELINE_FILES"

          # Add current results to the end
          BASELINE_FILES="$BASELINE_FILES results_current.json"

          # Run trend analysis
          uv run python scripts/version_benchmark.py \
            --trend $BASELINE_FILES \
            -o trend_analysis.json

          # Extract warnings for GitHub Actions
          uv run python -c "
          import json
          with open('trend_analysis.json') as f:
              trends = json.load(f)

          warnings = trends.get('warnings', [])
          if warnings:
              messages = [w['message'] for w in warnings]
              with open('trend_warnings.txt', 'w') as f:
                  f.write('\n'.join(messages))
          else:
              with open('trend_warnings.txt', 'w') as f:
                  f.write('none')
          "

          # Set output
          TREND_WARNINGS=$(cat trend_warnings.txt)
          {
            echo "warnings<<EOF"
            cat trend_warnings.txt
            echo "EOF"
          } >> $GITHUB_OUTPUT

      - name: Add trend analysis to summary
        if: steps.trends.outputs.warnings != '' && steps.trends.outputs.warnings != 'none'
        run: |
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 📊 Performance Trends" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [[ -f trend_analysis.json ]]; then
            # Extract and display trend statistics
            uv run python -c "
            import json
            with open('trend_analysis.json') as f:
                trends = json.load(f)

            print(f\"Analyzed {trends['baselines_count']} releases: {' → '.join(trends['versions'])}\")
            print()

            stats = trends['statistics']
            print(f\"- Average change: {stats['avg_change_pct']:+.2f}%\")
            print(f\"- Max regression: {stats['max_regression_pct']:+.1f}%\")
            print(f\"- Max improvement: {stats['max_improvement_pct']:+.1f}%\")
            print()

            if trends['warnings']:
                print('**⚠️ Gradual Degradation Detected:**')
                for w in trends['warnings']:
                    print(f\"- {w['message']}\")
            " >> $GITHUB_STEP_SUMMARY
          fi

      - name: Upload results
        uses: actions/upload-artifact@v6
        with:
          name: release-benchmark-${{ steps.versions.outputs.current }}
          path: |
            results_*.json
            comparison.txt
            trend_analysis.json
          retention-days: 400

      - name: Update release notes
        if: github.event_name == 'release'
        uses: actions/github-script@v8
        with:
          script: |
            const fs = require('fs');
            const comparison = fs.readFileSync('comparison.txt', 'utf8');
            const regressions = '${{ steps.comparison.outputs.regressions }}';

            let benchmarkSection = '\n\n---\n\n## Performance\n\n';

            // Add point-in-time comparison
            if (regressions !== 'none') {
              benchmarkSection += '⚠️ **Regressions detected:**\n```\n' + regressions + '\n```\n\n';
            } else {
              benchmarkSection += '✅ No significant performance regressions compared to ${{ steps.versions.outputs.baseline }}\n\n';
            }

            // Add trend analysis if available
            if (fs.existsSync('trend_analysis.json')) {
              const trends = JSON.parse(fs.readFileSync('trend_analysis.json', 'utf8'));

              benchmarkSection += '### 📊 Performance Trends\n\n';
              benchmarkSection += `Analyzed ${trends.baselines_count} releases: ${trends.versions.join(' → ')}\n\n`;

              const stats = trends.statistics;
              benchmarkSection += `- Average change: ${stats.avg_change_pct > 0 ? '+' : ''}${stats.avg_change_pct.toFixed(2)}%\n`;
              benchmarkSection += `- Max regression: ${stats.max_regression_pct > 0 ? '+' : ''}${stats.max_regression_pct.toFixed(1)}%\n`;
              benchmarkSection += `- Max improvement: ${stats.max_improvement_pct.toFixed(1)}%\n\n`;

              if (trends.warnings && trends.warnings.length > 0) {
                benchmarkSection += '**⚠️ Gradual Degradation Detected:**\n';
                for (const w of trends.warnings) {
                  benchmarkSection += `- ${w.message}\n`;
                }
                benchmarkSection += '\n';
              }

              if (trends.improvements && trends.improvements.length > 0) {
                benchmarkSection += '**🚀 Consistent Improvements:**\n';
                for (const imp of trends.improvements) {
                  benchmarkSection += `- ${imp.message}\n`;
                }
                benchmarkSection += '\n';
              }
            }

            benchmarkSection += '<details>\n<summary>Detailed benchmark comparison</summary>\n\n```\n';
            benchmarkSection += comparison;
            benchmarkSection += '\n```\n</details>';

            const release = await github.rest.repos.getRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: context.payload.release.id
            });

            await github.rest.repos.updateRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: context.payload.release.id,
              body: release.data.body + benchmarkSection
            });

      - name: Warn on regressions
        if: steps.comparison.outputs.regressions != 'none'
        run: |
          echo "::warning::Performance regressions detected: ${{ steps.comparison.outputs.regressions }}"

      - name: Warn on trend degradation
        if: steps.trends.outputs.warnings != '' && steps.trends.outputs.warnings != 'none'
        run: |
          echo "::warning::Gradual performance degradation detected across releases: ${{ steps.trends.outputs.warnings }}"
