name: Nightly CI

on:
  schedule:
    # Run at 4 AM UTC daily
    - cron: '0 4 * * *'
  workflow_dispatch:  # Allow manual trigger

jobs:
  mutation:
    name: Mutation Testing
    runs-on: ubuntu-latest
    timeout-minutes: 120  # Mutation testing can be slow

    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Install Python
        run: uv python install 3.11

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Run mutation testing
        run: |
          uv run mutmut run --no-progress --CI || true
          uv run mutmut results

      - name: Check kill rate
        run: |
          # Extract stats from mutmut results
          RESULTS=$(uv run mutmut results)
          echo "$RESULTS"

          # Parse killed and total counts
          KILLED=$(echo "$RESULTS" | grep -oP 'Killed \K\d+' || echo "0")
          SURVIVED=$(echo "$RESULTS" | grep -oP 'Survived \K\d+' || echo "0")
          TOTAL=$((KILLED + SURVIVED))

          if [ "$TOTAL" -gt 0 ]; then
            RATE=$((KILLED * 100 / TOTAL))
            echo "Mutation kill rate: $RATE% ($KILLED/$TOTAL)"

            # Fail if kill rate is below threshold (start with 50%, increase over time)
            if [ "$RATE" -lt 50 ]; then
              echo "::warning::Mutation kill rate below 50% threshold"
              # Don't fail initially - just warn
              # exit 1
            fi
          else
            echo "No mutations generated"
          fi

      - name: Upload mutation report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: mutation-report
          path: .mutmut-cache/
          retention-days: 30
