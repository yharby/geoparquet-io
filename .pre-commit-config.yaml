repos:
  - repo: https://github.com/commitizen-tools/commitizen
    rev: v4.1.0
    hooks:
      - id: commitizen
        stages: [commit-msg]

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
        args: ['--maxkb=500']
      - id: check-merge-conflict
      - id: check-toml
      - id: mixed-line-ending

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.14.1
    hooks:
      # Run the linter
      - id: ruff
        args: [--fix]
      # Run the formatter
      - id: ruff-format

  - repo: https://github.com/codespell-project/codespell
    rev: v2.4.2
    hooks:
      - id: codespell
        additional_dependencies:
          - tomli

  # -------------------------------------------------------------------------
  # Local hooks - commit stage (fast, <10s total)
  # -------------------------------------------------------------------------
  - repo: local
    hooks:
      # enforce logger usage over click.echo in core/
      - id: no-click-echo
        name: no-click-echo
        description: Use logger instead of click.echo in core/
        entry: bash
        args:
          - -c
          - |
            if grep -rn "click\.echo" geoparquet_io/core/ --include="*.py" | grep -v "logging_config.py"; then
              echo "ERROR: Use logger instead of click.echo in core/. See CLAUDE.md Logging section."
              exit 1
            fi
        language: system
        pass_filenames: false
        types: [python]

      - id: check-api-for-cli
        name: check-api-for-cli
        description: Remind to add Python API for new CLI commands
        entry: bash
        args:
          - -c
          - |
            # This is a reminder hook - it doesn't fail, just warns
            if git diff --cached --name-only | grep -q "geoparquet_io/cli/main.py"; then
              echo "⚠️  Reminder: If you added new CLI commands, ensure you also:"
              echo "   1. Added corresponding methods to api/table.py"
              echo "   2. Added corresponding functions to api/ops.py"
              echo "   3. Updated docs/api/python-api.md"
              echo "   See CLAUDE.md Quick Checklist for details."
            fi
        language: system
        pass_filenames: false
        always_run: true

      - id: validate-claude-md
        name: validate-claude-md
        description: Validate CLAUDE.md against the actual codebase
        entry: uv run python scripts/validate_claude_md.py
        language: system
        files: ^(CLAUDE\.md|geoparquet_io/cli/main\.py|pyproject\.toml)$
        pass_filenames: false

      - id: menard-check
        name: menard-check
        description: Check if documentation is stale relative to code changes
        entry: uv run menard check
        language: system
        pass_filenames: false
        always_run: true

      - id: doc-sync
        name: doc-sync
        description: Auto-update generated CLAUDE.md and SKILL.md sections
        entry: uv run python scripts/doc_sync.py --update
        language: system
        files: ^(geoparquet_io/cli/main\.py|geoparquet_io/cli/decorators\.py|pyproject\.toml|geoparquet_io/core/.*\.py)$
        pass_filenames: false

      - id: sync-dependencies
        name: sync-dependencies
        description: Auto-sync dependencies when pyproject.toml changes
        entry: bash
        args:
          - -c
          - |
            # Check if pyproject.toml was changed
            if git diff --cached --name-only | grep -q "^pyproject.toml$"; then
              if command -v uv &> /dev/null; then
                echo "📦 pyproject.toml changed, running uv sync..."
                uv sync --all-extras
                echo "✅ Dependencies synced"
              fi
            fi
        language: system
        pass_filenames: false
        always_run: true

  # -------------------------------------------------------------------------
  # Pre-push hooks (thorough checks, can be slower)
  # -------------------------------------------------------------------------
  - repo: local
    hooks:
      - id: deptry
        name: deptry
        description: Check for dependency issues
        entry: uv run deptry .
        language: system
        pass_filenames: false
        stages: [pre-push]

      - id: vulture
        name: vulture
        description: Find unused code
        entry: uv run vulture geoparquet_io/ --min-confidence 80
        language: system
        pass_filenames: false
        stages: [pre-push]

      - id: xenon
        name: xenon
        description: Monitor code complexity
        entry: uv run xenon --max-absolute=E --max-modules=D --max-average=C geoparquet_io/
        language: system
        pass_filenames: false
        stages: [pre-push]

      - id: import-linter
        name: import-linter
        description: Enforce architecture (core must not import click, api must not import cli)
        entry: uv run lint-imports
        language: system
        pass_filenames: false
        stages: [pre-push]

      - id: fast-tests
        name: fast-tests
        description: Run fast tests (optional - enable with ENABLE_PRE_PUSH_TESTS=1)
        entry: bash
        args:
          - -c
          - |
            # Only run if explicitly enabled via environment variable
            if [ "$ENABLE_PRE_PUSH_TESTS" = "1" ]; then
              echo "Running fast tests..."
              uv run pytest -n auto -m "not slow and not network" --tb=short
            else
              # Silent pass - tests not enabled
              exit 0
            fi
        language: system
        pass_filenames: false
        stages: [pre-push]
